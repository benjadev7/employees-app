
version: '3'

services:
  employee-db:
    image: mariadb:10.11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${BD_PASSWORD}
      MARIADB_USER: ${BD_USERNAME}
      MARIADB_DATABASE: ${BD_NAME}
      MARIADB_PASSWORD: ${BD_PASSWORD}
    volumes:
      - ./mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"

