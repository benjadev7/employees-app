
version: '3'

services:

  employee-app:
    build: .
    container_name: employee-app
    networks:
      - backend_network
    ports:
      - "8080:8080"
    depends_on:
      - employee-db
    environment:
      SPRING_PROFILES_ACTIVE: default
      URL_DB: jdbc:mysql://employee-db:3306/employees
      USER_DB: ${BD_USERNAME}
      PASS_BD: ${BD_PASSWORD}

  employee-db:
    image: mariadb:10.11
    restart: always
    networks:
      - backend_network
    environment:
      MARIADB_ROOT_PASSWORD: ${BD_PASSWORD}
      MARIADB_USER: ${BD_USERNAME}
      MARIADB_DATABASE: ${BD_NAME}
      MARIADB_PASSWORD: ${BD_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"

networks:
  backend_network:
    driver: bridge

volumes:
  mariadb_data:


